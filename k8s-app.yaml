apiVersion: v1
kind: Namespace
metadata:
  name: kuberprem

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuber-app-deployment
  namespace: kuberprem

spec:
  replicas: 3

  selector:
    matchLabels:
      app: spring-boot-k8s

  template:
    metadata:
      labels:
        app: spring-boot-k8s

    spec:
      containers:
        - name: kuber-app-container
          image: kumarpremji/spring-docker-jenkins:1.0.0-12
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083

---

apiVersion: v1
kind: Service
metadata:
  name: kuberapp-service
  namespace: kuberprem

spec:
  selector:
    app: spring-boot-k8s

  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8083

  type: NodePort